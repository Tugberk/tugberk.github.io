<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>



<style>
h2 {
color: red;
}

body {
font-family: Helvetica;
}
</style>

</head>


<body>
<br>
baslik: <input onclick='restart()' type="text" id='arama' placeholder="baslik gir"><button onclick="run()">ara</button>



<hr>
<div id="output"></div>
<div id='newDiv'></div>

</body>

<script>

var myArray = [];

 $.getJSON( "data.json", function(obj) {
  $.each(obj, function(key, value) {
         $("#output").append("<div class='"+value.baslik+"'><h2>"+value.baslik+"</h2>"+value.icerik+"</div>");
		 
		 
  });
  
  
 });
 


 

 function run() {

 	
 	var newDiv = document.getElementById('newDiv'); //yeni bir div yaratmak zorunda kaldim
 	var output = document.getElementById('output');
 	newDiv.innerHTML = '';


 	var aranan = document.getElementById('arama').value;
 	
 	var icerik = document.getElementsByClassName(aranan);
 	

 	for(j=0;j<icerik.length;j++){
 		//console.log(icerik[j].innerText)
 		newDiv.innerHTML += icerik[j].innerHTML;
 		
 	}
 	output.innerHTML = ''; //bunu temizliyorum ki ortada yazdirabilelim

 }


 function restart() {

 $.getJSON( "data.json", function(obj) {
  $.each(obj, function(key, value) {
         $("#output").append("<div class='"+value.baslik+"'><h2>"+value.baslik+"</h2>"+value.icerik+"</div>");
		 
		 
  });
  
  
 });


 }







</script>
</html>
