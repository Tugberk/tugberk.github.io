<!doctype html>
<html>
<head>
  <title>okunmamis kitaplar</title>
  <meta charset='utf-8'>
</head>
  <body>

    
    <div id='cansudiv'>
    <h2>cansu nun okumadigi kitaplar</h2><hr></div>
    <hr>
    <div id='tugberkdiv'>
    <h2>tugberk in okumadigi kitaplar</h2><hr></div>


</body>
<script>
  
var cansu = ['tolkien - in the silmarillion',
'tolkien - beren ile luthien', 
'tolkien - kullervo nun hikayesi',
'dostoyevski - yeraltından notlar',
'gogol - bir delinin hatıra defteri',
'daudet degermenimd - mektuplar',
'aristoteles - poetika',
'emile zola - hayvanlasan insan',
'tolstoy - savaş ve barış 1-2'];
var tugberk = ['Ursula Guin - Yerdeniz Buyucusu', 'Ursula Guin - Atuan Mezarları', 'Ursula Guin - En Uzak Sahil', 'Ursula Guin - Tehanu', 'Ursula Guin - Yerdeniz Oykuleri', 'Ursula Guin - Oteki Ruzgar', 'Daniel Defoe - Robinson Crusoe'];
  
var cansuDiv = document.getElementById('cansudiv');
var tugberkDiv = document.getElementById('tugberkdiv');
 
for(i=0;i<cansu.length;i++){
  cansuDiv.innerHTML += '<li>' + cansu[i] + '</li>'
}
  
for(j=0;j<tugberk.length;j++){
  tugberkDiv.innerHTML += '<li>' + tugberk[j] + '</li>'
}
  
</script>
</html>
