
<!doctype html>
<html>
<head>
	<meta name="viewport" charset="utf-8" content="width=device-width, initial-scale=1">
	<style>
	body{margin:40px
auto;max-width:650px;line-height:1.6;font-size:22px;color:#444;padding:0
10px}h1,h2,h3{line-height:1.2}
		
textarea {
    border: 0 none white;
    overflow: hidden;
    padding: 0;
    outline: none;
    background-color: white;
	resize: none;
}

</style>
</head>

<body>
<h2>kandil mesajları</h2>
<hr>
<textarea id="output" rows="4" cols="50"></textarea>
<br>
<button onclick="kandil()">kandil mesajı getir</button>
<button onclick="cuma()">cuma mesaji getir</button>

</body>
<script>

var output = document.getElementById('output');


var liste = [
"Allah'ım! Recep ve Şaban'ı hakkımızda mübarek eyle, bize Ramazan'a ulaştır. Regaib Kandiliniz mübarek olsun.",
"Allah'ım! Lütfundan bize rızk ver, bizi rızkından mahrum etme, bize verdiğin rızıkları bizim için bereketli yap, katında bulunan nimetlere rağbetimizi arttır ve bizi gönül zengini eyle.",
"Allah'ın rahmeti, bereketi sizinle olsun, gönül güneşiniz hiç solmasın, yüzünüz aydın olsun, kabriniz nur dolsun, makamınız Firdevs, dualarınız kabul olsun. Kandiliniz kutlu olsun..."
];


	
var cuma = [
"Allah’ım sen kalbimizden geçenleri hakkımızda hayırlı eyle… Hayırlı cumalar",
"Her derde deva Rabbim, senin için imkansız yoktur. Bu mübarek cuma gününde bizi mucizelerinden mahrum etme",
"İnsanoğlu, kainatı ve Rabbin yarattıklarını korumayı kendine bir görev bilmeli. Hayırlı cumalar",
"Dilinizden doğru, gönlünüzden merhamet, aklınızdan adalet eksik olmasın. Hayırlı cumalar",
"Kalp kırmayı bıraktığımız, birlik olduğumuz bir cuma günü olması dileğiyle",
"Bugün aklımızı ve kalbimizi arındırma günü. Hayvanlara eziyet etmediğimiz, kul hakkı yemediğimiz ve doğayı koruduğumuz bir gün olsun. Hayırlı cumalar."];


	

function shuffle(o){
	for(var j, x, i = o.length; i; j = Math.floor(Math.random() * i), x = o[--i], o[i] = o[j], o[j] = x);
	return o;
}

function copy() {
	let textarea = document.getElementById("output");
	textarea.select();
	document.execCommand("copy");
}


function kandil() {

	shuffle(liste);
	output.innerHTML = liste[0];
	copy();
}
	
function cuma() {

	shuffle(liste);
	output.innerHTML = cuma[0];
	copy();
}	

</script>
</html>
