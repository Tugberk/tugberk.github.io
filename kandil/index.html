
<!doctype html>
<html>
<head>
	<meta name="viewport" charset="utf-8" content="width=device-width, initial-scale=1">
	<style>
	body{margin:40px
auto;max-width:650px;line-height:1.6;font-size:22px;color:#444;padding:0
10px}h1,h2,h3{line-height:1.2}
		
textarea {
    border: 0 none white;
    overflow: hidden;
    padding: 0;
    outline: none;
    background-color: white;
	resize: none;
}

</style>
</head>

<body>
<h2>kandil mesajları</h2>
<hr>
<textarea id="output" rows="4" cols="50"></textarea>
<br>
<button onclick="rastgele()">rastgele getir ve kopyala!</button> <!-- <button onclick="copy()">Kopyala</button>-->

</body>
<script>

var output = document.getElementById('output');


var liste = [
"Allah'ım! Recep ve Şaban'ı hakkımızda mübarek eyle, bize Ramazan'a ulaştır. Regaib Kandiliniz mübarek olsun.",
"Allah'ım! Lütfundan bize rızk ver, bizi rızkından mahrum etme, bize verdiğin rızıkları bizim için bereketli yap, katında bulunan nimetlere rağbetimizi arttır ve bizi gönül zengini eyle.",
"Allah'ın rahmeti, bereketi sizinle olsun, gönül güneşiniz hiç solmasın, yüzünüz aydın olsun, kabriniz nur dolsun, makamınız Firdevs, dualarınız kabul olsun. Kandiliniz kutlu olsun..."
];



function shuffle(o){
	for(var j, x, i = o.length; i; j = Math.floor(Math.random() * i), x = o[--i], o[i] = o[j], o[j] = x);
	return o;
}

function copy() {
	let textarea = document.getElementById("output");
	textarea.select();
	document.execCommand("copy");
}


function rastgele() {

	shuffle(liste);
	output.innerHTML = liste[0];
	copy();
}

</script>
</html>
