<script>



//get text
var x = window.location;
x = x.search;
x = x.replace("?text=","");

//tek replace hepsini yapmadi kafama gore 5 loop attim

x = x.replace('%20',' ');

var myLink = "https://i.ytimg.com/vi/34gWNglchRs/maxresdefault.jpg";
console.log(myLink);

var img = new Image();   // Create new img element
img.addEventListener('load', function() {
  // execute drawImage statements here
  
  var canvas = document.createElement('canvas');
  canvas.width = img.width;
  canvas.height = img.height;
  var body = document.getElementsByTagName("body")[0];
  body.appendChild(canvas); //ekledik
  var context = canvas.getContext("2d");
  

  context.drawImage(img,0,0);
  
  
  context.font = "40px helvetica";
  context.fillStyle = "white";
  context.fillText(x,180, canvas.height - 100);
  
  
}, false);
//img.src = 'https://random.dog/fba53ab0-75df-4136-8212-1319e4524881.jpg';
