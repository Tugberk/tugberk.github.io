<body>

<div class="container">
<h2>Caps oluşturucu</h2>
<hr>
<br><br>
<form>
<div class="form-group">
    <label for="exampleInputEmail1">Yazılacak şey</label>
    <input type="text" class="form-control"class="form-control" id="text">
  </div>

<div class="form-group">
    <label for="exampleInputEmail1">URL adresi</label>
    <input type="text" class="form-control" id="myurl">
  </div>

<div class="form-group">
    <label for="exampleInputEmail1">Yazının boyutu</label>
    <input type="text" class="form-control" id="fontsize" value="32">
  </div>
  
 <div class="form-group">
    <label for="exampleInputEmail1">Yazının rengi (blue, #000000)</label>
    <input type="text" class="form-control" id="fontcolor" value="yellow">
  </div>
  
  <div class="form-group">
    <label for="exampleInputEmail1">Yer ayarı</label>
    <input type="text" class="form-control" id="xcoord" value="50"> 
  </div>
<button onclick="run()">create</button> 
  
</form>
</div>


</body>
<script>

function run() {

	var yazi = document.getElementById("text").value;
	var adres = document.getElementById("myurl").value;
	var fontsize = document.getElementById("fontsize").value + "px helvetica";
	var fontcolor = document.getElementById("fontcolor").value;
	var xcoord = document.getElementById("xcoord").value;
	

	window.location.href= "https://tugberk.github.io/apps/capsbackend.html?text="+ yazi + "&adres=" + adres + "&fontsize=" + fontsize + "&fontcolor=" + fontcolor + "&x=" + xcoord;



}
</script>
