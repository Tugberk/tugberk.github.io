<script>

var myLink = "";


new URL(location.href).searchParams.get('text');
const params = new URL(location.href).searchParams;
const x = params.get("text");
const adres = params.get("adres");
const fontsize = params.get("fontsize");
const fontcolor = params.get("fontcolor");
const xcoord = params.get("x");

console.log(x);
console.log(adres);
console.log(fontsize);
console.log(fontcolor);

myLink = adres;

console.log(myLink);

var img = new Image();   // Create new img element
img.addEventListener('load', function() {
  // execute drawImage statements here
  
  var canvas = document.createElement('canvas');
  canvas.width = img.width;
  canvas.height = img.height;
  var body = document.getElementsByTagName("body")[0];
  body.appendChild(canvas); //ekledik
  var context = canvas.getContext("2d");
  

  context.drawImage(img,0,0);
  
  
  //context.font = "32px helvetica";
  context.font = fontsize;
  context.fillStyle = fontcolor;
  context.fillText(x,xcoord, canvas.height - xcoord); //burayi linkten input verebilir miyiz? ya da buna slider?
  
  
}, false);
//img.src = 'https://random.dog/fba53ab0-75df-4136-8212-1319e4524881.jpg';
img.src = myLink;


//reload ettirmeden yeniden yazdirmasi lazim bu ustten olabilir

</script>
