<!doctype html>
<html>
<head>
	<title>Secret Santa - 2 li hediye çekilişi</title>
  <meta name="viewport" charset="utf-8" content="width=device-width, initial-scale=1">
  <style>
    body{margin:40px
  auto;max-width:650px;line-height:1.6;font-size:22px;color:#444;padding:0
  10px}h1,h2,h3{line-height:1.2}
  </style>
</head>
<body>
	<a href="https://eksisozluk.com/secret-santa--1128028"><h2>Secret Santa</h2></a>
	<div id="right"><img src="https://meridiandaily.net/wp-content/uploads/2014/12/Decret-santa.png" style="float: right;"/></div>
	<hr>
	<p>Arasından kura çekilecek isimleri aşağıya alt alta yazın. Kimin kime hediye alacağı otomatik oluşturulsun! </p>
	<textarea id="mytext" rows="20" cols="50"></textarea>
	<br>
	<button onclick="work()">secret santa</button>
	<br>
	<span id="output"></span>
</body>
<script>

var output = document.getElementById("output");
var input = document.getElementById("mytext");
input.focus();

function work() {

	var success = true;

	//input bos mu kontrol edelim
	if(input.value == 0){
		alert("Lütfen listeyi boş bırakmayın!");
		location.reload();
	}


	//degerleri alip array e atalim
	var myArray = input.value.split("\n");
	
		
	//bos karakter varsa silelim
	for(j=0; j < myArray.length; j++){
		if(myArray[j] == ""){
			myArray.splice(j,1);
			}
	}	
		
	//input cift sayi olmali - tek sayi olursa olmaz eger boyleyse bir kisiyi silecekler 
	if(myArray.length % 2 !== 0) {
		alert("Katılan sayısı çift olmalı, lütfen bir kişi silin!");
		//location.reload();
		input.focus();
		success = false;
	}

	
	
	//success diye bir variable kullandik ki sonuclar yazisi ekrana hep gelmesin
	if(success == true){
		//cikti
		output.innerHTML += "<br><u>Sonuçlar:</u>"
		
		//array in icerigini karistirdik
		shuffle(myArray);
		console.log(myArray);
	
		//simdi sirayla secip esleyecegiz
		for(k=0;k<myArray.length;k++){
			
			output.innerHTML += "<br><b>" + myArray[k] + "</b> ile <b>" + myArray[k+1] + "</b>";
			myArray.splice(k, 1);
			
		}
	
	}
	
}

//shuffle fonksiyonu
function shuffle(o){
    for(var j, x, i = o.length; i; j = Math.floor(Math.random() * i), x = o[--i], o[i] = o[j], o[j] = x);
    return o;
}

</script>
</html>
