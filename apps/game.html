function letsgo(){

item_temp[i] = new_item[i];

}
}


//shuffle fonksiyonu
function shuffle(o){
    for(var j, x, i = o.length; i; j = Math.floor(Math.random() * i), x = o[--i], o[i] = o[j], o[j] = x);
    return o;
}

var count = -1;
