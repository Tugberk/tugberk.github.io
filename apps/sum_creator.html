<script>


var output = document.getElementById("output");

{

	toplam = [];

	for(i=0;i<sayi;i++){

		{

			}

			//toplam.push(x)
			}
		}
		toplam.push(x);
		output.innerHTML += "" + (i+1) + ") " +  x + " = ? <br><br>";
	}

}

//cikarma
function cikart() 
{

	output.innerHTML = "";
	toplam = [];
	
	var sayi = document.getElementById("sayi").value;

	for(i=0;i<sayi;i++){
		
		
		var first = randomOlustur(100);

		{

		output.innerHTML += "" + (i+1) + ") " +  x + " = ? <br><br>";

}


//carpma
function carp() 
{

	output.innerHTML = "";

	var sayi = document.getElementById("sayi").value;

		var x = randomOlustur(100) + "x" + randomOlustur(10);

	}

}


function randomOlustur(sayi)
	{

		var rand_sayi = Math.floor(Math.random() * sayi)+ 1;
		//console.log(rand_sayi);
		return rand_sayi;
	}
