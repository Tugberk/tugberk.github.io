<button id="buton" onclick="kontrol()">yes</button>

<script>
	
var sayiArray = [];
var elemanSayisi = 3;
var maxSayi = 10;

for(i=0;i<elemanSayisi;i++) {
	sayiArray.push(randomOlustur(maxSayi));
}	

console.log(sayiArray);
var sayilar = document.getElementById('sayilar');

//ekrana yazdiralim
for(i=0;i<sayiArray.length;i++)
{
	
	
	if(i !== 0){
		sayilar.innerHTML += " + ";
	}
	
	
	sayilar.innerHTML += sayiArray[i] + " ";
	
	if(i == sayiArray.length - 1){
		sayilar.innerHTML += "=";
	}
}


sum = 0;
for(j=0; j<sayiArray.length; j++) {
	sum = sum + sayiArray[j];
}


var count = 0;
document.getElementById('cevap').focus();



//var timerVar = 0;

var id;

	//id yi disari aldim, window ekledim bir de timeout larin basina oldu.
	
	var cevap = document.getElementById('cevap').value;
	console.log("Cevap:", cevap);
	
	if(cevap == sum) {
		console.log("dogru");
		count++;
		
		//timer icin - durduruyor timer i
		window.clearTimeout(id);
		
		
		if(count % 5 == 0){
			console.log("5 oldu");
			elemanSayisi = elemanSayisi + 1;
		}
		
		sayiArray = [];
		
		for(i=0; i<elemanSayisi; i++) {
			sayiArray.push(randomOlustur(maxSayi));
		}

		sayilar.innerHTML = "";
		
		for(i=0; i<sayiArray.length; i++)
		{
			//sayilar.innerHTML += "+" +  sayiArray[i] + " = " ;
			if(i !== 0){
		sayilar.innerHTML += " + ";
	}
	
	
	sayilar.innerHTML += sayiArray[i] + " ";
	
	if(i == sayiArray.length - 1){

	}
		}
		
		//var id = setTimeout(exit, 5000);

		sum = 0;
		
		for(j=0; j<sayiArray.length; j++) {
			sum = sum + sayiArray[j];
		}
		
		console.log("Count: ", count);

	}
	else {
	console.log("yanlis");
	document.write("bitti - dogru sayisi: " + count);
	
	}
	//return sum;
	
}


	function exit() {
		document.write("sure bitti. dogru sayisi: " + count);
		}

	function exit_new() {
		document.write("deneme");
		}

	
	//bu fonksiyonda + 1 ekledim, cok 0 geliyordu.
	function randomOlustur(sayi)
	{

		var rand_sayi = Math.floor(Math.random() * sayi)+ 1;
		//alert(rand_sayi);
		console.log(rand_sayi);
		return rand_sayi;
	}
