<!doctype html>
<html>
<head>
	<title>Kura - Çekiliş</title>
<meta name="viewport" charset="utf-8" content="width=device-width, initial-scale=1">
<style>
	body{margin:40px
auto;max-width:650px;line-height:1.6;font-size:22px;color:#444;padding:0
10px}h1,h2,h3{line-height:1.2}
	</style>

</head>
<body>
	<h2>Cekilis Programı</h2>
	<hr>
	<p>Arasından kura çekilecek isimleri aşağıya alt alta yazın. Kutuya kaç kişilik çekiliş olacaksa onu girin, ve kura çekin. </p>
	<textarea id="mytext" rows="20" cols="50"></textarea>
	<br>
	<input type="number" id="adet" value = "1" placeholder="kac kisilik cekilis olsun?">
	<button onclick="work()">kura cek</button>
	<br>
	<span id="output"></span>

</body>
<script>

var kisi = document.getElementById("adet");
var output = document.getElementById("output");
var input = document.getElementById("mytext");
input.focus();

function work() {

	//degerleri myArray isimli dizimize kaydettik
	var myArray = input.value.split("\n");
	
	//ama bu dizide bos karakterler var mi? yanlislikla bos enter i almis olabilir
	//o yuzden bos deger varsa silecegiz
	for(j=0;j<myArray.length;j++){
		if(myArray[j] == "") {
			myArray.splice(j,1);
		}
	}
	
	//kisi sayisi olarak gecerli bir sey giriyor mu kontrol ediyoruz
	if(kisi.value == 0) {
		kisi.value == 1;
	}
	if(kisi.value > myArray.length | kisi.value < 0) {
		alert("Lutfen gecerli bir kişi sayısı girin!");
		location.reload();
	}

	
	output.innerHTML = "Çekiliş sonucu:";

	//simdi kac tane varsa o kadar dondurucez
	for(i=0;i<kisi.value;i++) {
		myRand = randomOlustur(myArray.length); //randomolustur fonksiyonundan donen degeri esitledik
		output.innerHTML = output.innerHTML + "<br><b>- " + myArray[myRand] + "</b>";
		myArray.splice(myRand,1);
	}
}

function randomOlustur(sayi){

	var rand_sayi = Math.floor(Math.random() * sayi);
	//alert(rand_sayi);
	console.log(rand_sayi);
	return rand_sayi;

}


</script>
</html>
