<!doctype html>
<html>
<head>
<style>
body {
  font-family: "Work Sans";
}

p {
  font-size: 50px;
  font-weight: 100;
  animation: hello 0.5s ease-in-out infinite;
  text-align: center;
}

@keyframes hello {
  0% {
    font-weight: 100;
  }
  50% {
    font-weight: 900;
  }
  100% {
    font-weight: 100;
  }
}
</style>
</head>
<body>
<link href='https://fonts.googleapis.com/css?family=Work+Sans:400,100,200,300,500,600,700,800,900' rel='stylesheet' type='text/css'>
<p>I LIKE THAT !!</p>
</body>
</html>
