<!DOCTYPE html>
<html>
<head>
<style>
div.gallery {
  border: 1px solid #ccc;
}

div.gallery:hover {
  border: 1px solid #777;
}

div.gallery img {
  width: 100%;
  height: auto;
}

div.desc {
  padding: 15px;
  text-align: center;
}

* {
  box-sizing: border-box;
}

.responsive {
  padding: 0 6px;
  float: left;
  width: 24.99999%;
}

@media only screen and (max-width: 700px) {
  .responsive {
    width: 49.99999%;
    margin: 6px 0;
  }
}

@media only screen and (max-width: 500px) {
  .responsive {
    width: 100%;
  }
}

.clearfix:after {
  content: "";
  display: table;
  clear: both;
}
</style>
<title>watches</title>
</head>
<body>

<!--

<div id="output"></div>


<div class="clearfix"></div>

<script>

var output = document.getElementById("output");


var myList = ["adidas_titanium.jpg", "ancon_military.jpg", "casio_black.jpg", "casio_dw5600.jpeg", "casio_mudman.jpg", "invicta.jpg", "invicta_f1.jpg", "meistersinger_no1.jpg", "oris_aquis.jpg", "raketa_24hr.jpg", "seiko_sakura.jpg", "seiko_skx009.jpg", "seiko_sportura.jpg", "Seiko-Presage-SPB041J1-35.jpg", "timex_ironman.jpg", "tudor_blackbay.jpg", "fc_automatic.jpg"];

for(i=0;i<myList.length;i++)
{
	output.innerHTML += "<div class='responsive'><div class='gallery'><a target='_blank' href='" + myList[i]+ "'><img src='images/" + myList[i]+ "' width='400' height='400'></a></div></div>";
}



</script>
</html>
