<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<style>
	body {
	text-align: center; 
	padding-top: 40px;
	
	}
	#myout {
	text-size: 30px;
	visibility: hidden;
	}
	div {
		text-align: center;
		font-size: 30px;
	}
	input {
		height: 30px;
		font-size: 20px;
	}
	button {
		height: 50px;
		width:100px;
		font-size: 20px;
	}
	</style>
</head>
<body>
<h2>Çay Zamanlayıcı</h2>
<hr><br>
	<input type="number" id="dakika" placeholder="dakika girin">
	<br><br><button onclick=run()>başla</button>
	<br><br>
	<div id='myout'>çayın demlenmesine kalan:<span id="output"></span> saniye</div>
</body>
<script>

var output = document.getElementById('output');
//document.getElementById('dakika').value = 20;


function run() {

	document.getElementById('myout').style.visibility = 'visible';
	var dakika = document.getElementById('dakika').value;
	var saniye = dakika * 60;
	
	//check for empty
	if (dakika < 1){
		document.write("no");
	}
	//her saniye bunu yazdiralim
	output.innerHTML = saniye;
	var myVar = setInterval(timerRun, 1000);
	
	function timerRun(){

		saniye = saniye -1;
		output.innerHTML = saniye;
		if(saniye == 0){
			var audio = new Audio('play.mp3');
			audio.loop = true;
			audio.play();
			
			document.write('bitti');
		
		}
	
}
	
}


</script>
</html>
