<html>

<style>
html, body {
    height: 100%;
	
}

html {
    display: table;
    margin: auto;
}

body {
    display: table-cell;
    vertical-align: middle;
}
</style>
</head>
<body>

<!--
<span id="a" onmouseover="" onmouseout=""><img src="heart.png"></span>
<span id="b" onmouseover="" onmouseout=""><img src="heart.png"></span>
<span id="c" onmouseover="" onmouseout=""><img src="heart.png"></span>
<span id="d" onmouseover="" onmouseout=""><img src="heart.png"></span>

<div id="mydiv" onmouseover="myOver()" onmouseout="myOut()">

<span><img src="heart.png"></span>	
<span><img src="heart.png"></span>	
<span><img src="heart.png"></span>	
<span><img src="heart.png"></span>	
<span><img src="heart.png"></span>	
<span><img src="heart.png"></span>	
<span><img src="heart.png"></span>	
<span><img src="heart.png"></span>	

	
</div>



</body>
<script>


function myOver() {

	var myDiv = document.getElementById("mydiv");
	myDiv.innerHTML = "";
	
	var isim = ["e","s","r","a","e","z","g","i"];
	for(i=0;i<isim.length;i++)
	{
		myDiv.innerHTML += isim[i];
	}

}

function myOut(){

var myDiv = document.getElementById("mydiv");
myDiv.innerHTML = "";
for(i=0;i<9;i++)
{
	myDiv.innerHTML += '<span><img src="heart.png"></span>';
}


}



</script>
