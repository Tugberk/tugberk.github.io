<!doctype html>
<html>
<head>
	<meta charset='utf-8'>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<div id='output'></div>

</body>
<script>

var output = document.getElementById('output');

mytext = 'feyza pabucu yarıııım, çık dışarıya oynayalım!';
mytext = mytext.split('');

var myVar = setInterval(run, 50);
i = 0;

function run() {

	output.innerHTML += mytext[i];
	if(i !== mytext.length - 1){
	i++;
	} else {
		console.log('hey yo');
		clearInterval(myVar);
	}
	
}


</script>
</html>
